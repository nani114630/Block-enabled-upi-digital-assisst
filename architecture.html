<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Diagram</title>
<style>
  body {
    background-color: #0f172a; /* Slate 900 */
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  .container {
    width: 1000px;
    height: 600px;
    position: relative;
    background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    border: 1px solid #334155;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }
  .node {
    position: absolute;
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 2px solid #38bdf8; /* Sky 400 */
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    width: 140px;
    z-index: 2;
    transition: all 0.3s ease;
  }
  .node:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
    background: rgba(30, 41, 59, 1);
  }
  .node h3 {
    margin: 0 0 10px 0;
    font-size: 18px;
    color: #e0f2fe;
  }
  .node p {
    margin: 0;
    font-size: 13px;
    color: #94a3b8;
  }
  .icon {
    font-size: 30px;
    margin-bottom: 10px;
  }
  /* Positions */
  #user { top: 250px; left: 50px; border-color: #f472b6; box-shadow: 0 0 20px rgba(244, 114, 182, 0.2); }
  #frontend { top: 250px; left: 280px; }
  #backend { top: 250px; left: 510px; border-color: #a78bfa; box-shadow: 0 0 20px rgba(167, 139, 250, 0.2); }
  
  #database { top: 50px; left: 780px; border-color: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }
  #payment { top: 200px; left: 780px; border-color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
  #blockchain { top: 350px; left: 780px; border-color: #818cf8; box-shadow: 0 0 20px rgba(129, 140, 248, 0.2); }
  #storage { top: 500px; left: 780px; border-color: #2dd4bf; box-shadow: 0 0 20px rgba(45, 212, 191, 0.2); }
  
  /* Connecting Lines */
  .line {
    position: absolute;
    background: #38bdf8;
    z-index: 1;
    box-shadow: 0 0 8px #38bdf8;
  }
  .line.horizontal {
    height: 3px;
  }
  .line.vertical {
    width: 3px;
  }
  
  .label {
    position: absolute;
    background: #0f172a;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: #cbd5e1;
    z-index: 3;
    border: 1px solid #334155;
  }

  /* SVG for complex curves */
  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  path {
    fill: none;
    stroke: #38bdf8;
    stroke-width: 3;
    filter: drop-shadow(0 0 4px #38bdf8);
  }
  .stroke-pink { stroke: #f472b6; filter: drop-shadow(0 0 4px #f472b6); }
  .stroke-purple { stroke: #a78bfa; filter: drop-shadow(0 0 4px #a78bfa); }

</style>
</head>
<body>

<div class="container">
  <!-- SVG Lines -->
  <svg>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
      </marker>
      <marker id="arrow-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6" />
      </marker>
      <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
      </marker>
    </defs>
    <!-- User to Frontend -->
    <path d="M 230 300 L 280 300" class="stroke-pink" marker-end="url(#arrow-pink)" />
    <!-- Frontend to Backend -->
    <path d="M 460 300 L 510 300" marker-end="url(#arrowhead)" />
    
    <!-- Backend to DB -->
    <path d="M 690 280 C 730 280, 730 100, 780 100" class="stroke-purple" marker-end="url(#arrow-purple)" />
    <!-- Backend to Payment -->
    <path d="M 690 300 L 780 250" class="stroke-purple" marker-end="url(#arrow-purple)" />
    <!-- Backend to Blockchain -->
    <path d="M 690 300 L 780 400" class="stroke-purple" marker-end="url(#arrow-purple)" />
    <!-- Backend to Storage -->
    <path d="M 690 320 C 730 320, 730 550, 780 550" class="stroke-purple" marker-end="url(#arrow-purple)" />
  </svg>

  <!-- Labels -->
  <div class="label" style="top: 280px; left: 220px;">Uses</div>
  <div class="label" style="top: 280px; left: 455px;">API</div>
  <div class="label" style="top: 150px; left: 700px;">Save</div>
  <div class="label" style="top: 250px; left: 710px;">INR</div>
  <div class="label" style="top: 365px; left: 700px;">Mint</div>
  <div class="label" style="top: 450px; left: 700px;">IPFS</div>

  <!-- Nodes -->
  <div class="node" id="user">
    <div class="icon">👤</div>
    <h3>Client</h3>
    <p>End User / Browser</p>
  </div>
  
  <div class="node" id="frontend">
    <div class="icon">⚛️</div>
    <h3>Frontend</h3>
    <p>Next.js & React</p>
  </div>
  
  <div class="node" id="backend">
    <div class="icon">⚙️</div>
    <h3>Backend API</h3>
    <p>Node.js & Express</p>
  </div>
  
  <div class="node" id="database">
    <div class="icon">🍃</div>
    <h3>Database</h3>
    <p>MongoDB Atlas</p>
  </div>
  
  <div class="node" id="payment">
    <div class="icon">💳</div>
    <h3>Payments</h3>
    <p>Razorpay Gateway</p>
  </div>
  
  <div class="node" id="blockchain">
    <div class="icon">⛓️</div>
    <h3>Blockchain</h3>
    <p>Polygon Network</p>
  </div>
  
  <div class="node" id="storage">
    <div class="icon">📦</div>
    <h3>Storage</h3>
    <p>IPFS via Pinata</p>
  </div>

</div>

</body>
</html>
