version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: upi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: upi
    volumes:
      - mongodb_data:/data/db
    networks:
      - upi-network

networks:
  upi-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local